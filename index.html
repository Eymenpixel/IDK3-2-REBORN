<!DOCTYPE html>
<html>
<head>
    <title>EYMEN CLOUD OS</title>
    <style>
        body { background: #0c0c0c; color: #4af626; font-family: monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #auth-box { background: #1a1a1a; padding: 20px; border: 2px solid #4af626; border-radius: 10px; text-align: center; }
        input { background: #000; border: 1px solid #4af626; color: #4af626; padding: 10px; margin: 5px; outline: none; }
        button { background: #4af626; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }
        #terminal-box { display: none; width: 90%; height: 90%; flex-direction: column; }
        #output { flex: 1; overflow-y: auto; padding: 20px; border: 1px solid #333; }
        #input-line { display: flex; background: #1a1a1a; padding: 10px; }
        #cmd { background: transparent; border: none; color: #fff; flex: 1; outline: none; }
    </style>
</head>
<body>
    <div id="auth-box">
        <h2>EYMEN CLOUD ACCESS</h2>
        <input type="text" id="user" placeholder="Kullanıcı Adı"><br>
        <input type="password" id="pass" placeholder="Şifre"><br>
        <button onclick="auth('login')">Giriş Yap</button>
        <button onclick="auth('register')">Yeni Kayıt</button>
        <button onclick="auth('clone')" style="background: #fdfd00">Klonla</button>
    </div>

    <div id="terminal-box">
        <div id="output">Welcome to Eymen Cloud OS... Type 'help' for commands.</div>
        <div id="input-line">
            <span>root@cloud:~# </span>
            <input type="text" id="cmd" autofocus>
        </div>
    </div>

    <script>
        let currentUser = "";
        const API = "https://idk3-2-reborn.onrender.com";

        async function auth(mode) {
            const username = document.getElementById('user').value;
            const password = document.getElementById('pass').value;
            let body = { mode, username, password };
            
            if(mode === 'clone') body.target_user = prompt("Klonlanacak kullanıcı adı?");

            const res = await fetch(`${API}/auth`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(body)
            });
            const data = await res.json();
            
            if(data.status === 'success') {
                alert(data.msg || "Giriş Başarılı!");
                currentUser = username;
                document.getElementById('auth-box').style.display = 'none';
                document.getElementById('terminal-box').style.display = 'flex';
            } else {
                alert(data.msg);
            }
        }

        document.getElementById('cmd').addEventListener('keypress', async (e) => {
            if(e.key === 'Enter') {
                const command = e.target.value;
                const outDiv = document.getElementById('output');
                outDiv.innerHTML += `<div><span style="color:white">root@cloud:~#</span> ${command}</div>`;
                
                const res = await fetch(`${API}/exec`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ username: currentUser, command })
                });
                const data = await res.json();
                outDiv.innerHTML += `<div>${data.output}</div>`;
                e.target.value = "";
                outDiv.scrollTop = outDiv.scrollHeight;
            }
        });
    </script>
</body>
</html>
