<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EYMENPIXEL | UBUNTU TERMINAL</title>
    <style>
        body { background-color: #0c0c0c; color: #4af626; font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #terminal { flex: 1; padding: 20px; overflow-y: auto; text-shadow: 0 0 5px #4af626; }
        .line { margin-bottom: 8px; line-height: 1.2; }
        #input-line { display: flex; align-items: center; padding: 10px 20px; background: #1a1a1a; border-top: 1px solid #333; }
        #prompt { color: #fdfd00; font-weight: bold; margin-right: 10px; }
        #cmd { background: transparent; border: none; color: #4af626; font-family: inherit; font-size: 16px; outline: none; flex: 1; }
        .scanlines { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06)); background-size: 100% 2px, 3px 100%; pointer-events: none; }
    </style>
</head>
<body>
    <div class="scanlines"></div>
    <div id="terminal">
        <div class="line">Welcome to Ubuntu 22.04.3 LTS (GNU/Linux 5.15.0-generic x86_64)</div>
        <div class="line">* Documentation:  https://help.ubuntu.com</div>
        <div class="line">* Management:     https://landscape.canonical.com</div>
        <div class="line"></div>
        <div class="line">Last login: Tue Apr 14 15:52:10 2026 from 127.0.0.1</div>
        <div class="line">root@eymenpixel:~# <span style="color:white">Sistem hazır. Komut bekleniyor...</span></div>
    </div>
    <div id="input-line">
        <span id="prompt">root@eymenpixel:~#</span>
        <input type="text" id="cmd" autofocus spellcheck="false" autocomplete="off">
    </div>

    <script>
        const terminal = document.getElementById('terminal');
        const cmd = document.getElementById('cmd');

        function addLine(text, color = '#4af626') {
            const div = document.createElement('div');
            div.className = 'line';
            div.style.color = color;
            div.innerHTML = text;
            terminal.appendChild(div);
            terminal.scrollTop = terminal.scrollHeight;
        }

        cmd.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const input = cmd.value.trim().toLowerCase();
                addLine(`<span id="prompt">root@eymenpixel:~#</span> ${cmd.value}`, 'white');

                if (input === 'ls') {
                    addLine('bin/  boot/  dev/  etc/  home/  lib/  root/  srv/  tmp/  usr/  var/');
                } else if (input === 'whoami') {
                    addLine('eymenpixel_root_admin');
                } else if (input === 'hack') {
                    addLine('>> Brute-forcing Amsterdam servers...');
                    setTimeout(() => addLine('>> Connection established! Bypass successful.'), 500);
                    setTimeout(() => addLine('>> Accessing database... [OK]'), 1000);
                } else if (input === 'clear') {
                    terminal.innerHTML = '';
                } else if (input === 'help') {
                    addLine('Komutlar: ls, whoami, hack, clear, help');
                } else {
                    addLine(`Command '${input}' not found. Type 'help' for options.`, 'red');
                }
                cmd.value = '';
            }
        });
    </script>
</body>
</html>
