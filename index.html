<!DOCTYPE html>
<html>
<head>
    <title>EYMEN CLOUD OS</title>
    <style>
        body { background: #0c0c0c; color: #4af626; font-family: monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #auth-box { background: #1a1a1a; padding: 25px; border: 2px solid #4af626; border-radius: 8px; text-align: center; }
        input { background: #000; border: 1px solid #4af626; color: #4af626; padding: 10px; margin: 5px; outline: none; width: 180px; }
        button { background: #4af626; color: #000; border: none; padding: 10px; cursor: pointer; font-weight: bold; margin: 3px; }
        #terminal-box { display: none; width: 95%; height: 95%; flex-direction: column; background: #000; }
        #output { flex: 1; overflow-y: auto; padding: 15px; white-space: pre-wrap; border: 1px solid #222; }
    </style>
</head>
<body>
    <div id="auth-box">
        <h2>EYMEN CLOUD</h2>
        <input type="text" id="user" placeholder="Kullanıcı"><br>
        <input type="password" id="pass" placeholder="Şifre"><br>
        <button onclick="auth('login')">GİRİŞ</button>
        <button onclick="auth('register')">YENİ KAYIT</button>
    </div>

    <div id="terminal-box">
        <div id="output">Sistem hazır...</div>
    </div>

    <script>
        // ÖNEMLİ: Buradaki linki Render panelindeki linkle birebir aynı yap!
        const API = window.location.origin; 

        async function auth(mode) {
            const username = document.getElementById('user').value;
            const password = document.getElementById('pass').value;
            
            console.log("Bağlanılan Adres:", `${API}/auth`); // Hata ayıklama için

            try {
                const res = await fetch(`${API}/auth`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ mode, username, password })
                });
                
                if (!res.ok) throw new Error("Sunucu cevap vermedi");
                
                const data = await res.json();
                if(data.status === 'success') {
                    alert("Başarılı! Giriş yapılıyor...");
                    document.getElementById('auth-box').style.display = 'none';
                    document.getElementById('terminal-box').style.display = 'flex';
                } else {
                    alert("Hata: " + data.msg);
                }
            } catch (err) {
                console.error(err);
                alert("Sunucu uyanamadı veya bağlantı reddedildi! Lütfen 10 saniye sonra tekrar dene.");
            }
        }
    </script>
</body>
</html>
